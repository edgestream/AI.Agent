# Repo-scoped Codex configuration for AI.Agent.
# Codex reads this file for trusted projects. The CLI and IDE extension share MCP config.

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true

[mcp_servers.openai-docs]
url = "https://developers.openai.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true
